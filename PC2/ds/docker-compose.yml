version: '3.9'

services:
  php:
    build:
      context: .        
      dockerfile: Dockerfile #Em vez de fazer download de uma imagem, ele vai ler o Dockerfile
    volumes:
      - ./src:/var/www/html #Localização do meu código , por exemplo, ficheitos php lidos apache
    ports:
      - "9000:80" #para aceder ao php no browser através de localhost:9000.
    depends_on:
      - mysql #Garante que o MySQL arranca antes do PHP
  mysql:
    platform: linux/amd64 #Garante que o MySQL corre sem erros em Macs novos.
    image: mysql:8.0 # Evitar colocar  'latest' para ter estabilidade no MAC, se for só windows colocar latest
    container_name: mysql # Nome qu eo container vai assunir, facultativo
    restart: no #O Docker não tentará reiniciar o contentor automaticamente.
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DEFAULT_AUTHENTICATION_PLUGIN: mysql_native_password #resolver um problema de compatibilidade de "idioma" entre o PHP e o MySQL.
      # 1. ADICIONADO: Cria a base de dados automaticamente
      MYSQL_DATABASE: labirinto
    volumes:
      - ./mysql_data/:/var/lib/mysql
       #para os dados da base de dados não desaparecerem quando o contentor é desligado (ficam guardados/espelhados na pasta ./mysql_data/).
       #./mysql_data/ é a pasta no computador (o "Host"), na mesma pasta onde está o ficheiro docker-compose.yml
       #var/lib/mysql é o local dentro do contentor onde o MySQL guarda, por padrão, todos os ficheiros da base de dados (tabelas, registos, utilizadores).
      - ./mysql_files:/var/lib/mysql-files/
      #pasta segura dedicada à importação e exportação de ficheiros (como ficheiros .csv ou .txt) entre o teu Mac e o MySQL.
      # 2. ADICIONADO: Pega no teu ficheiro e corre-o no arranque para criar as tabelas
      - ./mysql_files/labirinto.sql:/docker-entrypoint-initdb.d/labirinto.sql
      # 3. ADICIONADO: Preenche as tabelas com dados iniciais (executado DEPOIS do labirinto.sql, por ordem alfabética)
      - ./mysql_files/labirinto_preencher.sql:/docker-entrypoint-initdb.d/labirinto_preencher.sql
    ports:
      - "3306:3306"      

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - 9001:80 #para aceder ao phpmyadmin no browser através de localhost:9001.
    environment:
      PMA_ARBITRARY: 1  
      #faz aparecer um campo extra chamado "Servidor" (ou Server) no ecrã de login do phpMyAdmin (localhost:9001), ou seja, permtite aceder a contentores de outro projeto 
    depends_on:
      - mysql
 
 
  mongo1:
    image: mongo:latest
    container_name: mongo1
    ports:
      - "27017:27017"
    command: mongod --replSet rs0 --bind_ip_all
    
  mongo2:
    image: mongo:latest
    container_name: mongo2
    ports:
      - "27018:27017"
    command: mongod --replSet rs0 --bind_ip_all
    
  mongo3:
    image: mongo:latest
    container_name: mongo3
    ports:
      - "27019:27017"
    command: mongod --replSet rs0 --bind_ip_all
    
  mongo-setup:
    image: mongo:latest
    container_name: mongo-setup
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    command: >
      bash -c "
        echo 'Aguardando MongoDBs...' &&
        sleep 20 &&
        echo 'Configurando replica set com prioridades...' &&
        mongosh --host mongo1:27017 --eval '
          try {
            rs.initiate({
              _id: \"rs0\",
              members: [
                {_id: 0, host: \"mongo1:27017\", priority: 2},
                {_id: 1, host: \"mongo2:27017\", priority: 1},
                {_id: 2, host: \"mongo3:27017\", priority: 1}
              ]
            });
            print(\"Replica set iniciado!\");
            
            // Aguarda eleição
            sleep(5000);
            
            // Verifica
            print(\"Status após configuração:\");
            rs.status().members.forEach(m => print(\"  \" + m.name + \" -> \" + m.stateStr));
            
          } catch(e) {
            if (e.codeName === \"AlreadyInitialized\") {
              print(\"ℹReplica set já estava configurado\");
              print(\"Status atual:\");
              rs.status().members.forEach(m => print(\"  \" + m.name + \" -> \" + m.stateStr));
            } else {
              print(\"Erro: \" + e.message);
            }
          }
        '
      "